# Development environment
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-harvest}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-harvest_dev}
      POSTGRES_DB: ${DB_NAME:-harvest_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-harvest}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: harvest-finance/backend
      target: builder          # Use the build stage so code hot-reloads via volume
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: harvest-finance/backend/.env
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3001:3001"
    volumes:
      - ./harvest-finance/backend/src:/app/src
    command: npm run start:dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3

  frontend:
    build:
      context: harvest-finance/frontend
      target: deps
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./harvest-finance/frontend/src:/app/src
      - ./harvest-finance/frontend/public:/app/public
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
